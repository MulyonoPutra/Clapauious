<section class="py-1 bg-slate-700">
  <div class="w-full lg:w-8/12 px-4 mx-auto mt-6">
    <form [formGroup]="profileForms">
      <div class="relative flex flex-col min-w-0 break-words w-full mb-6 shadow-lg rounded-lg bg-slate-900 border-0">
        <div class="rounded-t  bg-slate-900 mb-0 px-6 py-6">
          <div class="text-center flex justify-between">
            <h6 class="text-white text-xl font-bold">
              My account
            </h6>
            <button
              class="bg-indigo-500 text-white active:bg-indigo-600 font-bold uppercase text-xs px-4 py-2 rounded shadow hover:shadow-md outline-none focus:outline-none mr-1 ease-linear transition-all duration-150"
              type="button" [disabled]="!profileForms.valid" (click)="update()">
              Update
            </button>
          </div>
        </div>
        <div class="flex-auto px-4 lg:px-10 py-10 pt-0">
            <h6 class="text-white text-sm mt-3 mb-6 font-bold uppercase">
              User Information
            </h6>
            <div class="flex space-x-4">
              <div>
                <img class="inline object-cover w-32 h-28 mr-2 rounded-full"
                  src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_640.png"
                  alt="Profile image" />
                  <label class="block uppercase text-white text-xs font-bold mt-3 cursor-pointer"
                  htmlfor="grid-password">
                  Upload Avatar
                </label>
              </div>

              <div>
                <div class="flex flex-wrap">
                  <div class="w-full lg:w-6/12 px-4">
                    <div class="relative w-full mb-3">
                      <mat-form-field class="w-full" appearance="outline">
                        <mat-label>Username</mat-label>
                        <input matInput placeholder="Username" formControlName="username">
                      </mat-form-field>
                    </div>
                    <error-messages [control]="$any(profileForms).control?.username"></error-messages>
                  </div>
                  <div class="w-full lg:w-6/12 px-4">
                    <div class="relative w-full mb-3">
                      <mat-form-field class="w-full" appearance="outline">
                        <mat-label>Email address</mat-label>
                        <input matInput placeholder="Email address" formControlName="email">
                      </mat-form-field>
                    </div>
                  </div>
                  <div class="w-full lg:w-6/12 px-4">
                    <div class="relative w-full mb-3">
                      <mat-form-field class="w-full" appearance="outline">
                        <mat-label>Phone Number</mat-label>
                        <input matInput placeholder="Phone Number" formControlName="phone">
                      </mat-form-field>
                    </div>
                  </div>
                </div>
              </div>
            </div>


            <hr class="mt-6 border-b-1 border-blueGray-300">

            <h6 class="text-white text-sm mt-3 mb-6 font-bold uppercase">
              Contact Information
            </h6>
            <div class="flex flex-wrap">
              <div class="w-full lg:w-12/12 px-4">
                <div class="relative w-full mb-3">
                  <mat-form-field class="w-full" appearance="outline">
                    <mat-label>Address</mat-label>
                    <input matInput placeholder="Address" formControlName="address">
                  </mat-form-field>
                </div>
              </div>
              <div class="w-full lg:w-4/12 px-4">
                <div class="relative w-full mb-3">
                  <mat-form-field class="w-full" appearance="outline">
                    <mat-label>City</mat-label>
                    <input matInput placeholder="City" formControlName="city">
                  </mat-form-field>
                </div>
              </div>
              <div class="w-full lg:w-4/12 px-4">
                <div class="relative w-full mb-3">
                  <mat-form-field class="w-full" appearance="outline">
                    <mat-label>Country</mat-label>
                    <input matInput placeholder="Country" formControlName="country">
                  </mat-form-field>
                </div>
              </div>
              <div class="w-full lg:w-4/12 px-4">
                <div class="relative w-full mb-3">
                  <mat-form-field class="w-full" appearance="outline">
                    <mat-label>Postal Code</mat-label>
                    <input matInput placeholder="Postal Code" formControlName="zipCode">
                  </mat-form-field>
                </div>
              </div>
            </div>

            <hr class="mb-3 mt-6 border-b-1 border-blueGray-300">
            <div class="flex flex-wrap">
              <div class="w-full lg:w-12/12 px-4">
                <div class="relative w-full mb-3">
                  <mat-form-field class="w-full" appearance="outline">
                    <mat-label>About Me</mat-label>
                    <textarea matInput placeholder="About Me"></textarea>
                  </mat-form-field>
                </div>
              </div>
            </div>
        </div>
      </div>
    </form>
  </div>
</section>
