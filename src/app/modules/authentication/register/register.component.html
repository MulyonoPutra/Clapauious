<!-- component -->
<div class="bg-gray-100 min-h-screen flex flex-col">
  <div class="container max-w-sm mx-auto flex-1 flex flex-col items-center justify-center px-2">
    <div class="bg-white px-6 py-8 rounded shadow-md text-black w-full">
      <h1 class="mb-6 text-center text-3xl font-extrabold text-gray-900">Sign up</h1>
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Full Name</mat-label>
        <input matInput placeholder="Full Name">
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Email Address</mat-label>
        <input matInput placeholder="Email Address">
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Password</mat-label>
        <input matInput placeholder="Password">
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Confirm Password</mat-label>
        <input matInput placeholder="Confirm Password">
      </mat-form-field>

      <button type="submit"
        class="relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">Create
        Account</button>

      <div class="text-center text-sm text-grey-dark mt-4">
        By signing up, you agree to the
        <a class="no-underline border-b border-grey-dark text-grey-dark" href="#">
          Terms of Service
        </a> and
        <a class="no-underline border-b border-grey-dark text-grey-dark" href="#">
          Privacy Policy
        </a>
      </div>
    </div>

    <div class="text-grey-dark mt-6">
      Already have an account? Please
      <a class="no-underline border-b border-blue text-indigo-600" routerLink="/login">
        Log in
      </a>.
    </div>
  </div>
</div>
